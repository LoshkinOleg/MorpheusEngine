factions:

  # --- Player ---
  - id: world.player_crew
    name: Player Crew
    type: crawler
    relationToPlayer: friendly
    description: >
      The player's own sandcrawler and its crew of roughly 20.
      No fixed allegiance. Starting position and reputation are undefined.

  # --- Crawler factions ---
  - id: world.nomad_caravans
    name: Nomad Caravans
    type: crawler_fleet
    relationToPlayer: neutral
    description: >
      Loose flotillas of trading crawlers that travel established routes
      between city-states, hauling water, fuel, scavenged metals, and goods.
      Generally non-aggressive but well-armed for self-defense. Will trade
      with anyone who approaches peacefully.

  - id: world.scrap_raiders
    name: Scrap Raiders
    type: crawler_fleet
    relationToPlayer: hostile
    description: >
      Aggressive crawler packs that prey on lone travelers, small
      caravans, and poorly defended settlements. Interested primarily in
      salvage, fuel, and captives. Loosely organized around charismatic
      warlords. Composition and leadership shift constantly.

  - id: world.iron_convoy
    name: The Iron Convoy
    type: crawler_fleet
    relationToPlayer: neutral
    description: >
      A disciplined mercenary fleet known for reliable contract work.
      Escorts caravans, guards extraction sites, and occasionally hires
      out for city-state military operations. Professional and
      transactional — loyalty lasts exactly as long as the contract.

  - id: world.deep_desert_prospectors
    name: Deep Desert Prospectors
    type: crawler_fleet
    relationToPlayer: cautious
    description: >
      Small, rugged crawlers and bike teams that venture into extremely
      remote regions searching for untouched old empire ruins, lost
      crawlers, or undiscovered resource deposits. Secretive and
      suspicious of strangers but may trade valuable salvage or
      information.

  # --- City-state factions ---
  - id: world.oasis_league
    name: Oasis League
    type: city_alliance
    relationToPlayer: cautious
    description: >
      A coalition of several neighboring oasis city-states that have
      agreed to mutual defense pacts and a shared token currency for
      inter-city trade. Suspicious of unaffiliated crawlers but open to
      trade. Controls significant water reserves.

  - id: world.petrograd_combine
    name: Petrograd Combine
    type: city_alliance
    relationToPlayer: neutral
    description: >
      An alliance of petrol extraction cities that dominate the fuel
      supply in their region. Wealthy and heavily defended by mercenary
      crawler fleets. Pragmatic and commercially minded — willing to deal
      with anyone who has something to offer or a service to sell.

  - id: world.free_oases
    name: Free Oases
    type: independent_cities
    relationToPlayer: neutral
    description: >
      Unaligned oasis city-states that have resisted joining any
      coalition. Range from prosperous independent trading hubs to
      struggling backwater settlements. Policies toward crawlers vary
      widely by city — some welcome traders, others shoot on approach.

  - id: world.hull_city
    name: Hull City
    type: ruin_city
    relationToPlayer: cautious
    description: >
      A significant city built inside and around the mangled remains of
      a massive crashed imperial starship. The hull is actively mined
      for metals and occasional technological artifacts. A major trade
      destination for scavengers and prospectors. Politically independent
      and fiercely protective of its claim.

  # --- Special factions ---
  - id: world.the_leviathan
    name: The Leviathan
    type: mega_crawler
    relationToPlayer: neutral
    description: >
      One of the rumored nuclear-powered mega-crawlers. A mobile
      city-state housing thousands, fielding its own escort fleet, and
      answering to no one. Sightings are rare and often exaggerated.
      Its intentions, route, and leadership are subjects of widespread
      speculation and folk legend across the planet.

  - id: world.slave_camps
    name: Bonded Settlements
    type: dependent_settlements
    relationToPlayer: neutral
    description: >
      Tiny subjugated farming oases and work camps controlled by larger
      city-states or powerful crawlers. Populations of a few hundred,
      primarily enslaved laborers or indentured workers. Produce food
      and water for their overlords. May be liberated, traded for, or
      exploited depending on the player's choices.
